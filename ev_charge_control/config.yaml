name: "EV Charge Control"
version: "1.0.4"
slug: "ev_charge_control"
description: "Calculate EV charging windows from pricing, SoC targets, and finish-by constraints."
url: "https://github.com/cajo-dk/ev-charge-control"
startup: "application"
boot: "auto"
init: false
homeassistant_api: true
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
options:
  log_level: "info"
  ev_current_soc_entity: ""
  target_soc_entity: ""
  ev_battery_capacity_entity: ""
  charger_speed_entity: ""
  charge_loss_entity: ""
  finish_by_entity: ""
  pricing_information_entity: ""
  result_helper_entity: ""
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)?"
  ev_current_soc_entity: "str?"
  target_soc_entity: "str?"
  ev_battery_capacity_entity: "str?"
  charger_speed_entity: "str?"
  charge_loss_entity: "str?"
  finish_by_entity: "str?"
  pricing_information_entity: "str?"
  result_helper_entity: "str?"
